<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comprobantes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --border: #e8e8e8;
    --border-dark: #1a1a1a;
    --text: #0a0a0a;
    --muted: #666666;
    --dim: #999999;
    --accent: #87BD8B;
    --accent-hover: #6fa874;
    --accent-soft: #eef7ef;
    --danger: #c92a2a;
    --cat1: #4a90a8;
    --cat2: #c48b4a;
    --cat3: #8a6cb5;
    --cat4: #666666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    font-feature-settings: "ss01", "cv11";
  }

  .header {
    padding: 40px 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-inner { max-width: 640px; margin: 0 auto; }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1.5px;
    line-height: 0.95;
  }
  .logo {
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    color: var(--accent);
    font-size: 22px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo .amp {
    font-weight: 400;
    margin: 0 4px;
  }
  .logo .sa {
    font-size: 0.55em;
    font-weight: 900;
    margin-left: 4px;
    letter-spacing: 0.5px;
  }
  .header .tagline {
    font-size: 10px;
    color: var(--muted);
    margin-top: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 0 20px 60px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .month-block {
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
  }
  .month-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.8px;
    line-height: 1;
  }
  .month-info .year-text {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }
  .nav-buttons { display: flex; gap: 8px; }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
    border-radius: 0;
  }
  .nav-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

  .modes {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    flex: 1;
    padding: 14px 8px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .mode-btn.active {
    color: #4a7a4e;
    border-bottom-color: var(--accent);
  }
  .mode-btn .title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .mode-btn .desc {
    font-size: 10px;
    margin-top: 3px;
    color: var(--dim);
    letter-spacing: 0.3px;
  }
  .mode-btn.active .desc { color: #4a7a4e; }

  /* Category selector (for uploading) */
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  .cat-btn {
    padding: 12px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cat-btn .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-btn .cat-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.1px;
  }
  .cat-btn.active {
    border-color: var(--border-dark);
    background: var(--surface);
  }
  .cat-btn.active .cat-name { color: var(--text); }

  /* Filter tabs (for viewing) */
  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-bottom: 18px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .filter-btn .f-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn:hover { border-color: var(--border-dark); color: var(--text); }
  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .filter-btn .count-badge {
    font-size: 10px;
    opacity: 0.7;
  }

  .upload-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .upload-btn {
    flex: 1;
    border: 1px solid var(--border-dark);
    background: var(--bg);
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-family: inherit;
    display: block;
  }
  .upload-btn:hover {
    background: var(--text);
    color: var(--bg);
  }
  .upload-btn.processing { opacity: 0.5; cursor: wait; }
  .upload-btn .icon { font-size: 22px; margin-bottom: 6px; display: block; }
  .upload-btn .text { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
  .upload-btn .sub {
    font-size: 10px; color: var(--muted); margin-top: 3px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .upload-btn:hover .sub { color: rgba(255,255,255,0.7); }

  .status-msg {
    text-align: center;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid;
  }
  .status-msg.processing {
    background: var(--accent-soft);
    color: #4a7a4e;
    border-color: var(--accent);
  }
  .status-msg.error {
    background: #fff0f0;
    color: var(--danger);
    border-color: var(--danger);
  }
  .status-msg .proc-icon {
    display: inline-block;
    margin-right: 8px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .label-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-dark);
    padding: 12px 0;
    color: var(--text);
    font-size: 15px;
    outline: none;
    font-family: inherit;
    margin-bottom: 32px;
    transition: border-color 0.15s;
  }
  .label-input:focus { border-bottom-color: var(--accent); border-bottom-width: 2px; }
  .label-input::placeholder { color: var(--dim); font-weight: 400; }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .stats-row .count-block .count-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stats-row .count-block .count-value {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -1.5px;
  }
  .pdf-btn {
    background: var(--accent);
    color: #0a2e12;
    border: none;
    padding: 14px 24px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pdf-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .pdf-btn:disabled {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
    cursor: default;
  }
  .pdf-btn.generating { opacity: 0.6; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
    position: relative;
  }
  .card:hover { border-color: var(--text); }
  .card .cat-stripe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    z-index: 2;
  }
  .card .img-wrap {
    position: relative;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .card img {
    width: 100%;
    display: block;
    object-fit: cover;
    max-height: 200px;
  }
  .card .info {
    padding: 10px 12px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card .info .meta { overflow: hidden; min-width: 0; flex: 1; }
  .card .info .lbl {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    letter-spacing: -0.1px;
  }
  .card .info .cat-name-small {
    font-size: 10px;
    font-weight: 700;
    margin-top: 3px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  .card .info .date-row {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
    letter-spacing: 0.2px;
  }
  .card .info .badge {
    font-size: 9px;
    padding: 1px 6px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-color { background: var(--accent-soft); color: #4a7a4e; }
  .badge-bw { background: #f0f0f0; color: #333; }
  .badge-orig { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .del-btn {
    background: transparent;
    border: none;
    color: var(--dim);
    padding: 4px 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    flex-shrink: 0;
    font-family: inherit;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    border: 1px dashed var(--border);
  }
  .empty .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
  .empty .title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .empty .sub { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Comprobantes</h1>
    <div class="logo">NEHUEL<span class="amp">&amp;</span>CO.<span class="sa">SA.</span></div>
    <p class="tagline">Escanear · Organizar · Exportar</p>
  </div>
</div>

<div class="container">
  <div class="month-block">
    <div class="month-nav">
      <div class="month-info">
        <h2 id="monthName"></h2>
        <div class="year-text" id="yearLabel"></div>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevMonth">←</button>
        <button class="nav-btn" id="nextMonth">→</button>
      </div>
    </div>
  </div>

  <div class="section-label">Modo de escaneo</div>
  <div class="modes">
    <button class="mode-btn active" data-mode="color">
      <div class="title">Color HD</div>
      <div class="desc">Contraste + nitidez</div>
    </button>
    <button class="mode-btn" data-mode="bw">
      <div class="title">B&N Texto</div>
      <div class="desc">Blanco y negro</div>
    </button>
    <button class="mode-btn" data-mode="original">
      <div class="title">Original</div>
      <div class="desc">Sin procesar</div>
    </button>
  </div>

  <div class="section-label">Categoría</div>
  <div class="category-grid" id="categoryGrid"></div>

  <div class="section-label">Agregar comprobante</div>
  <div class="upload-row">
    <label class="upload-btn" for="galleryInput">
      <span class="icon">◱</span>
      <span class="text">Galería</span>
      <div class="sub">Fotos guardadas</div>
    </label>
    <label class="upload-btn" for="cameraInput">
      <span class="icon">◉</span>
      <span class="text">Cámara</span>
      <div class="sub">Foto nueva</div>
    </label>
  </div>
  <input type="file" id="galleryInput" accept="image/*" multiple style="display:none">
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

  <div id="statusBox"></div>

  <input class="label-input" id="labelInput" placeholder="Etiqueta (opcional: Luz, Gas, Alquiler...)">

  <div class="section-label">Filtrar por categoría</div>
  <div class="filter-row" id="filterRow"></div>

  <div class="stats-row">
    <div class="count-block">
      <div class="count-label" id="countLabel">Este mes</div>
      <div class="count-value" id="receiptCount">0</div>
    </div>
    <button class="pdf-btn" id="pdfBtn" disabled>Generar PDF</button>
  </div>

  <div id="gridContainer"></div>
</div>

<script>
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const CATEGORIES = [
  { id: "edeste_norm",  name: "Normalización EDESTE", color: "var(--cat1)", hex: "#4a90a8" },
  { id: "cavyag_norm",  name: "Normalización CAVyAG", color: "var(--cat2)", hex: "#c48b4a" },
  { id: "md_edeste",    name: "MD EDESTE",            color: "var(--cat3)", hex: "#8a6cb5" },
  { id: "otros",        name: "Otros",                color: "var(--cat4)", hex: "#666666" },
];

function getCategory(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[3];
}

const now = new Date();
let currentYear = now.getFullYear();
let currentMonth = now.getMonth();
let receipts = [];
let scanMode = "color";
let selectedCategory = "edeste_norm"; // default para subir
let activeFilter = "all"; // "all" | category id
let processing = false;
let generating = false;
let jsPDFLib = null;

const $monthName = document.getElementById("monthName");
const $yearLabel = document.getElementById("yearLabel");
const $grid = document.getElementById("gridContainer");
const $count = document.getElementById("receiptCount");
const $countLabel = document.getElementById("countLabel");
const $pdfBtn = document.getElementById("pdfBtn");
const $galleryInput = document.getElementById("galleryInput");
const $cameraInput = document.getElementById("cameraInput");
const $labelInput = document.getElementById("labelInput");
const $modeBtns = document.querySelectorAll(".mode-btn");
const $statusBox = document.getElementById("statusBox");
const $categoryGrid = document.getElementById("categoryGrid");
const $filterRow = document.getElementById("filterRow");

function showStatus(msg, type) {
  $statusBox.innerHTML = `<div class="status-msg ${type}">${type === 'processing' ? '<span class="proc-icon">●</span>' : ''}${msg}</div>`;
}
function clearStatus() { $statusBox.innerHTML = ""; }

function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Failed to load " + url));
    document.head.appendChild(s);
  });
}

async function ensureJsPDF() {
  if (jsPDFLib) return jsPDFLib;
  const urls = [
    "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js",
    "https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js",
    "https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js",
  ];
  for (const url of urls) {
    try {
      await loadScript(url);
      if (window.jspdf && window.jspdf.jsPDF) {
        jsPDFLib = window.jspdf.jsPDF;
        return jsPDFLib;
      }
    } catch(e) { console.warn("Failed:", url); }
  }
  throw new Error("No se pudo cargar la librería PDF. Revisá tu conexión.");
}

function storageKey(y, m) { return `comprobantes:${y}-${String(m+1).padStart(2,"0")}`; }
function loadReceipts() {
  try {
    const raw = localStorage.getItem(storageKey(currentYear, currentMonth));
    receipts = raw ? JSON.parse(raw) : [];
    // backfill for old receipts without category
    receipts.forEach(r => { if (!r.category) r.category = "otros"; });
  } catch { receipts = []; }
}
function saveReceipts() {
  try {
    localStorage.setItem(storageKey(currentYear, currentMonth), JSON.stringify(receipts));
  } catch(e) {
    showStatus("No hay espacio para guardar. Eliminá comprobantes viejos.", "error");
  }
}

function applyBrightnessContrast(ctx, w, h, brightness, contrast) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  const f = (259*(contrast+255))/(255*(259-contrast));
  for (let i = 0; i < d.length; i += 4) {
    d[i]   = Math.min(255, Math.max(0, f*(d[i]+brightness-128)+128));
    d[i+1] = Math.min(255, Math.max(0, f*(d[i+1]+brightness-128)+128));
    d[i+2] = Math.min(255, Math.max(0, f*(d[i+2]+brightness-128)+128));
  }
  ctx.putImageData(img, 0, 0);
}

function applySharpen(ctx, w, h, strength) {
  const img = ctx.getImageData(0, 0, w, h);
  const src = new Uint8ClampedArray(img.data);
  const dst = img.data;
  const s = strength;
  const k = [0,-s,0,-s,1+4*s,-s,0,-s,0];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      for (let c = 0; c < 3; c++) {
        let v = 0;
        for (let ky = -1; ky <= 1; ky++)
          for (let kx = -1; kx <= 1; kx++)
            v += src[((y+ky)*w+(x+kx))*4+c] * k[(ky+1)*3+(kx+1)];
        dst[(y*w+x)*4+c] = Math.min(255, Math.max(0, v));
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

function applyAdaptiveThreshold(ctx, w, h) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  const gray = new Float32Array(w*h);
  for (let i = 0; i < w*h; i++)
    gray[i] = 0.299*d[i*4] + 0.587*d[i*4+1] + 0.114*d[i*4+2];

  const integral = new Float64Array(w*h);
  for (let y = 0; y < h; y++) {
    let rs = 0;
    for (let x = 0; x < w; x++) {
      rs += gray[y*w+x];
      integral[y*w+x] = rs + (y > 0 ? integral[(y-1)*w+x] : 0);
    }
  }

  const bs = Math.max(15, Math.round(Math.min(w,h)/30)|1);
  const half = bs >> 1;
  const C = 8;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const y1=Math.max(0,y-half-1), y2=Math.min(h-1,y+half);
      const x1=Math.max(0,x-half-1), x2=Math.min(w-1,x+half);
      const area=(y2-y1)*(x2-x1);
      let sum=integral[y2*w+x2];
      if(y1>0) sum-=integral[(y1-1)*w+x2];
      if(x1>0) sum-=integral[y2*w+(x1-1)];
      if(y1>0&&x1>0) sum+=integral[(y1-1)*w+(x1-1)];
      const val = gray[y*w+x] > (sum/area)-C ? 255 : 0;
      const idx=(y*w+x)*4;
      d[idx]=d[idx+1]=d[idx+2]=val;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function applyGamma(ctx, w, h, gamma) {
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  const lut = new Uint8Array(256);
  for (let i = 0; i < 256; i++)
    lut[i] = Math.min(255, Math.max(0, Math.round(255*Math.pow(i/255, 1/gamma))));
  for (let i = 0; i < d.length; i += 4) {
    d[i]=lut[d[i]]; d[i+1]=lut[d[i+1]]; d[i+2]=lut[d[i+2]];
  }
  ctx.putImageData(img, 0, 0);
}

function processImage(file, mode) {
  const MAX_W = 1800;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Error leyendo archivo"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Error cargando imagen"));
      img.onload = () => {
        try {
          const ratio = Math.min(MAX_W/img.width, 1);
          const w = Math.round(img.width*ratio);
          const h = Math.round(img.height*ratio);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);

          if (mode === "color") {
            applyGamma(ctx, w, h, 1.15);
            applyBrightnessContrast(ctx, w, h, 12, 40);
            applySharpen(ctx, w, h, 0.6);
          } else if (mode === "bw") {
            applyGamma(ctx, w, h, 1.3);
            applyBrightnessContrast(ctx, w, h, 15, 20);
            applyAdaptiveThreshold(ctx, w, h);
          }

          resolve({
            preview: canvas.toDataURL("image/jpeg", 0.82),
            hires: canvas.toDataURL("image/jpeg", 0.9),
          });
        } catch(err) { reject(err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function updateMonthDisplay() {
  $monthName.textContent = MONTHS_ES[currentMonth];
  $yearLabel.textContent = currentYear;
}

function renderCategorySelector() {
  $categoryGrid.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn ${selectedCategory === c.id ? 'active' : ''}" data-cat="${c.id}">
      <span class="cat-dot" style="background:${c.hex}"></span>
      <span class="cat-name">${c.name}</span>
    </button>
  `).join("");
  $categoryGrid.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedCategory = btn.dataset.cat;
      renderCategorySelector();
    });
  });
}

function renderFilterRow() {
  const counts = { all: receipts.length };
  CATEGORIES.forEach(c => { counts[c.id] = receipts.filter(r => r.category === c.id).length; });

  const items = [
    { id: "all", name: "Todos", hex: null, count: counts.all },
    ...CATEGORIES.map(c => ({ id: c.id, name: c.name, hex: c.hex, count: counts[c.id] }))
  ];

  $filterRow.innerHTML = items.map(it => `
    <button class="filter-btn ${activeFilter === it.id ? 'active' : ''}" data-filter="${it.id}">
      ${it.hex ? `<span class="f-dot" style="background:${it.hex}"></span>` : ''}
      <span>${it.name}</span>
      <span class="count-badge">${it.count}</span>
    </button>
  `).join("");

  $filterRow.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFilter = btn.dataset.filter;
      renderFilterRow();
      renderGrid();
    });
  });
}

function getFilteredReceipts() {
  if (activeFilter === "all") return receipts;
  return receipts.filter(r => r.category === activeFilter);
}

function renderGrid() {
  const filtered = getFilteredReceipts();
  $count.textContent = filtered.length;
  $pdfBtn.disabled = filtered.length === 0;

  if (activeFilter === "all") {
    $countLabel.textContent = "Este mes";
  } else {
    const cat = getCategory(activeFilter);
    $countLabel.textContent = cat.name;
  }

  if (filtered.length === 0) {
    $grid.innerHTML = `
      <div class="empty">
        <div class="icon">◫</div>
        <div class="title">${activeFilter === "all" ? "Sin comprobantes" : "Sin comprobantes en esta categoría"}</div>
        <div class="sub">${activeFilter === "all" ? "Elegí un modo y agregá tu primera foto" : "Probá con otra categoría o cargá una nueva"}</div>
      </div>`;
    return;
  }

  $grid.className = "grid";
  $grid.innerHTML = filtered.map(r => {
    const badgeClass = r.mode === "bw" ? "badge-bw" : r.mode === "color" ? "badge-color" : "badge-orig";
    const badgeText = r.mode === "bw" ? "B&N" : r.mode === "color" ? "Color" : "Orig";
    const cat = getCategory(r.category);
    return `
      <div class="card">
        <div class="cat-stripe" style="background:${cat.hex}"></div>
        <div class="img-wrap">
          <img src="${r.preview || r.data}" alt="${r.label || 'Comprobante'}">
        </div>
        <div class="info">
          <div class="meta">
            <div class="lbl">${r.label || "Sin etiqueta"}</div>
            <div class="cat-name-small" style="color:${cat.hex}">${cat.name}</div>
            <div class="date-row">${r.date} <span class="badge ${badgeClass}">${badgeText}</span></div>
          </div>
          <button class="del-btn" data-id="${r.id}">✕</button>
        </div>
      </div>`;
  }).join("");

  $grid.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      receipts = receipts.filter(r => r.id !== id);
      saveReceipts();
      renderFilterRow();
      renderGrid();
    });
  });
}

async function handleFiles(files) {
  if (processing) return;
  processing = true;
  showStatus("Procesando imágenes...", "processing");

  let errors = 0;
  for (const f of files) {
    if (!f.type.startsWith("image/")) continue;
    try {
      const { preview, hires } = await processImage(f, scanMode);
      receipts.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        preview, hires,
        label: $labelInput.value || f.name.replace(/\.[^.]+$/, ""),
        date: new Date().toLocaleDateString("es-AR"),
        mode: scanMode,
        category: selectedCategory,
      });
    } catch(err) {
      console.error("Process error:", err);
      errors++;
    }
  }
  saveReceipts();
  $labelInput.value = "";
  processing = false;
  if (errors > 0) {
    showStatus(`Error procesando ${errors} imagen(es). Las demás se guardaron.`, "error");
    setTimeout(clearStatus, 4000);
  } else {
    clearStatus();
  }
  renderFilterRow();
  renderGrid();
}

async function generatePDF() {
  const filtered = getFilteredReceipts();
  if (!filtered.length || generating) return;
  generating = true;
  $pdfBtn.textContent = "Cargando...";
  $pdfBtn.classList.add("generating");
  showStatus("Generando PDF, esto puede tomar un momento...", "processing");

  try {
    const jsPDF = await ensureJsPDF();
    $pdfBtn.textContent = "Generando...";

    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
    const pageW = 210, pageH = 297, margin = 8;
    const usableW = pageW - margin*2;
    const usableH = pageH - margin*2 - 8;

    for (let i = 0; i < filtered.length; i++) {
      if (i > 0) doc.addPage();
      doc.setFontSize(8);
      doc.setTextColor(140);
      const cat = getCategory(filtered[i].category);
      doc.text(
        `${MONTHS_ES[currentMonth]} ${currentYear}  -  ${cat.name}  -  ${filtered[i].label || "Comprobante"}  -  ${i+1}/${filtered.length}`,
        margin, margin+2
      );

      const imgSrc = filtered[i].hires || filtered[i].preview || filtered[i].data;
      if (!imgSrc) continue;

      const img = new Image();
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error("Error cargando imagen " + (i+1)));
        img.src = imgSrc;
      });

      const imgRatio = img.width / img.height;
      let w = usableW, h = w / imgRatio;
      if (h > usableH) { h = usableH; w = h * imgRatio; }
      const x = margin + (usableW - w) / 2;
      const y = margin + 6;
      doc.addImage(imgSrc, "JPEG", x, y, w, h, undefined, "FAST");
    }

    let suffix = "Todos";
    if (activeFilter !== "all") {
      const cat = getCategory(activeFilter);
      suffix = cat.name.replace(/\s+/g, "_").replace(/[áéíóúÁÉÍÓÚ]/g, c => ({á:'a',é:'e',í:'i',ó:'o',ú:'u',Á:'A',É:'E',Í:'I',Ó:'O',Ú:'U'}[c]));
    }
    const filename = `Comprobantes_${MONTHS_ES[currentMonth]}_${currentYear}_${suffix}.pdf`;

    try {
      doc.save(filename);
    } catch(saveErr) {
      const blob = doc.output("blob");
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    clearStatus();
  } catch(e) {
    console.error("PDF error:", e);
    showStatus("Error: " + (e.message || "No se pudo generar el PDF"), "error");
    setTimeout(clearStatus, 6000);
  }

  generating = false;
  $pdfBtn.textContent = "Generar PDF";
  $pdfBtn.classList.remove("generating");
}

document.getElementById("prevMonth").addEventListener("click", () => {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; } else currentMonth--;
  updateMonthDisplay(); loadReceipts(); renderFilterRow(); renderGrid();
});
document.getElementById("nextMonth").addEventListener("click", () => {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; } else currentMonth++;
  updateMonthDisplay(); loadReceipts(); renderFilterRow(); renderGrid();
});

$modeBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    $modeBtns.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    scanMode = btn.dataset.mode;
  });
});

$galleryInput.addEventListener("change", (e) => {
  if (e.target.files.length) handleFiles(Array.from(e.target.files));
  e.target.value = "";
});
$cameraInput.addEventListener("change", (e) => {
  if (e.target.files.length) handleFiles(Array.from(e.target.files));
  e.target.value = "";
});

$pdfBtn.addEventListener("click", generatePDF);

updateMonthDisplay();
loadReceipts();
renderCategorySelector();
renderFilterRow();
renderGrid();
</script>
</body>
</html>
